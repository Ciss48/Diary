<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Diary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="index">

  <div class="container">
    <!-- Header -->
    <header class="app-header">
      <div class="app-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        My <span>Diary</span>
      </div>
      <button class="btn" id="btn-history">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </button>
    </header>

    <!-- Paper card -->
    <div class="paper-card page-container">
      <!-- Date -->
      <div class="date-display" id="date-display">Loading…</div>

      <!-- Photo Strip -->
      <div class="photo-strip" id="photo-strip"></div>

      <!-- Todo Section -->
      <div class="todo-section" id="todo-section"></div>

      <!-- Two-panel editor layout -->
      <div class="editor-layout" id="editor-layout">

        <!-- Left: original writing -->
        <div class="writing-panel">
          <div class="panel-label">Original</div>
          <div class="lined-editor">
            <div class="line-numbers" id="line-numbers-orig"></div>
            <textarea
              id="diary-content"
              class="diary-textarea"
              placeholder="Write about your day…"
              spellcheck="true"
              autofocus
            ></textarea>
          </div>
        </div>

        <!-- Right: AI suggestion panel -->
        <div class="ai-box suggestion-panel">
          <div class="suggestion-panel-header">
            <div class="panel-label">&#10024; AI Suggestion</div>
            <button class="ai-box-close" title="Close">&times;</button>
          </div>
          <div class="lined-editor">
            <div class="line-numbers" id="line-numbers-ai"></div>
            <div class="ai-improved-text"></div>
          </div>
        </div>

      </div>

      <!-- AI bottom panel: What Changed + Writing Analysis -->
      <div class="ai-bottom-panel">
        <div class="ai-bottom-col">
          <div class="ai-section-label">What Changed</div>
          <ul class="ai-changes-list"></ul>
        </div>
        <div class="ai-bottom-col">
          <div class="ai-section-label">Writing Analysis</div>
          <ul class="ai-analysis-list"></ul>
        </div>
      </div>

      <!-- Save indicator -->
      <div class="save-indicator" id="save-indicator"></div>

      <!-- Actions -->
      <div class="actions-row">
        <button class="btn btn-ai" disabled>&#10024; Suggest better English</button>
      </div>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
